<meta name="theme-color" content="#0e141b">
<meta name="apple-mobile-web-app-title" content="Command Center">
<script>
  (function(){
    try{
      var t=localStorage.getItem('cc.theme');
      if(['slate','midnight','paper','mist'].indexOf(t)<0)t='slate';
      var d=localStorage.getItem('cc.density')==='compact'?'compact':'comfortable';
      var r=document.documentElement;r.setAttribute('data-theme',t);r.setAttribute('data-density',d);
    }catch(e){
      document.documentElement.setAttribute('data-theme','slate');
      document.documentElement.setAttribute('data-density','comfortable');
    }
  })();
</script>
