<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0f14">
<title>Command Center</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0b0f14;
    color: #c9d4de;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8fa3b3;
    margin: 0 0 2rem;
  }
  .light {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 1.25rem;
  }
  .status {
    font-size: 0.95rem;
    margin: 0 0 0.5rem;
  }
  .updated {
    font-size: 0.8rem;
    color: #5c6b78;
    margin: 0;
  }
</style>
</head>
<body>
<main>
  <h1>Command Center</h1>
  <div class="light" aria-hidden="true">&#x1F7E2;</div>
  <p class="status">All systems normal &mdash; detail moved to internal network</p>
  <p class="updated">Last updated: 2026-07-11</p>
</main>
</body>
</html>
